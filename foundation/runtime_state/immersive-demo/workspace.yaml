  # 第一章 · 黑雾初醒


  疼痛是第一个回归的感觉。


  像是有人用钝锈的凿子，从颅骨内侧一点一点往外撬。每撬一下，就有细碎的、冰冷的碎片在颅内碰撞，发出只有他自己能听见的脆响。他睁开眼，视野里没有光，只有一片黏稠的、仿佛凝固了的黑暗。


  他动了动手指。


  指尖触到的是粗糙的石面，表面覆着一层湿冷的黏液，触感像某种生物风干后的体液。他撑起身体，骨骼发出轻微的、令人牙酸的摩擦声。身体很重，像每一寸皮肤下都灌满了铅水，每一次呼吸都带着胸腔深处的钝痛。


  他不知道自己是谁。


  记忆是一片被搅碎的灰烬，只有零星的碎片飘浮在意识深处：一道寒光闪过，鲜血泼洒在石壁上；一个背影在雾中远去；还有某种冰冷的东西，被强行塞进身体深处，像一根烧红的铁钉钉进脊椎。


  他低头，看向自己的手。


  黑暗中只能勉强辨认出轮廓。手掌宽厚，指节粗大，虎口和指腹布满厚茧——这是一双握惯了武器的手。他摸索着身侧，指尖触到一处坚硬的、带着弧度的物体。他握住它，熟悉的冰冷感沿着掌心蔓延上来。


  那是一把短刃。


  刀身约一尺，通体漆黑，只在黑暗中隐约泛出暗哑的金属光泽。他握紧刀柄，手指沿着刀脊滑向刀尖，触碰到一些凹凸不平的刻痕。他凑近去看——尽管在黑暗中这毫无意义——但指尖的触感告诉他，那些刻痕是某种古老的符文，线条扭曲而诡异，像是某种活物的骨骼被强行压扁、烙印在金属上。


  他记不起这柄刀的来历。


  但他知道，它很重要。


  他撑着石壁站起身。眩晕感袭来，他踉跄一步，手掌按在石壁上稳住身形。石壁表面滑腻，触感像某种巨兽的鳞片。他深吸一口气，试图压下喉咙深处翻涌的恶心感。


  就在这时，他感觉到了。


  在胸腔深处，在心脏与肺叶之间，有一个冰冷的、不属于他的东西。


  它很小，小得像一粒尘埃，却沉重得仿佛能压垮整个身体。它静静地悬浮在那里，散发着某种微弱但持续的寒意，像一颗嵌入血肉的冰核。他尝试用意识去触碰它——这念头刚起，一股尖锐的刺痛便从那个位置炸开，瞬间席卷全身。


  他闷哼一声，单膝跪地。


  冷汗从额角渗出，沿着脸颊滑落，滴在石面上，发出细微的“嗒”声。疼痛过后，某种奇异的感觉开始浮现。他感觉到那粒“尘埃”在微微震动，每一次震动都带起周围血肉的共鸣，仿佛它正在从他的身体里汲取着什么，又或者，正在向他输送着什么。


  他想起了一个词。


  **微粒**。


  这个词凭空出现在脑海里，像一块浮出水面的冰。没有上下文，没有解释，只有这个词本身，带着某种冰冷的、不容置疑的重量。


  微粒。


  他环顾四周。黑暗依旧浓稠，但渐渐地，他的眼睛开始适应。他发现自己身处一条狭窄的通道中，两侧石壁高耸，向上延伸，消失在头顶的黑暗里。通道向前延伸，尽头处有微弱的光——不是自然光，而是一种浑浊的、泛着暗绿色的荧光，像是某种腐烂的苔藓散发出的光芒。


  空气中弥漫着一股气味：潮湿的石头、腐烂的有机物，还有一种更深的、难以形容的腥甜，像是血液与某种金属混合后的味道。


  他握紧短刃，沿着通道向前走去。


  脚步声在狭窄的空间里回荡，每一次落脚都激起细微的回音，仿佛有什么东西在暗处模仿着他的步伐。石壁上的黏液越来越多，有些地方甚至凝结成半透明的胶状物，里面包裹着细小的、已经干瘪的虫壳。


  走了大约五十步，通道开始向下倾斜。


  坡度很陡，地面湿滑，他不得不放慢速度，用短刃的刀尖抵着石壁，借力稳住身体。越往下走，那股腥甜的气味就越浓，暗绿色的荧光也越发明亮。他听见了声音——不是脚步声，而是某种更细微的、连绵不绝的窸窣声，像是无数细小的爪子在地面上爬行。


  通道的尽头是一个开阔的空间。


  他停在入口处，藏在阴影里，向外望去。


  这是一个巨大的洞穴，洞顶高悬，垂落着无数钟乳石，石尖滴落着暗绿色的黏液，在地面上汇聚成一片片浅洼。洞穴中央有一座石台，石台表面刻满了与短刃上相似的符文，此刻正散发着微弱的、脉动的光芒。


  石台周围，有三个人。


  他们都穿着暗灰色的长袍，袍角沾满了黏液和污渍。其中一人跪在石台前，双手按在符文上，口中念念有词。另两人站在两侧，手里握着某种金属制的长杆，杆头闪烁着不稳定的电弧。


  “还差一点。”跪着的人抬起头，声音沙哑，“这处遗迹的微粒浓度太低，献祭了三具‘载体’，也只提取出这么点。”


  “够用了。”左侧持杆的人说，声音冰冷，“带回‘渡口’，够换三天的配额。”


  “渡口……”右侧的人嗤笑一声，“跨过第一重天堑的资格，就值三天的配额？”


  “闭嘴。”跪着的人低喝，“你想引来‘巡游者’吗？”


  洞穴里安静了一瞬。


  他屏住呼吸，身体贴在石壁上，像一块没有生命的石头。影迹潜行——这个词自然而然地浮现在脑海里，仿佛是一种本能。他的呼吸变得极轻，心跳放缓，连体温都似乎在下降，与周围的黑暗融为一体。


  他观察着那三个人。


  他们身上没有明显的武器，但那种长杆显然不是摆设。更重要的是，他感觉到了他们身上的“微粒”——不是他体内那种冰冷的、孤立的颗粒，而是某种流动的、活跃的东西，像细小的溪流在他们体内循环。


  掠夺集团。


  又一个词跳出来。没有记忆支撑，只有纯粹的直觉：他们是敌人。


  石台上的光芒突然变得强烈。


  跪着的人双手猛地一抬，从石台表面抽出一缕细如发丝的、泛着暗金色光泽的“线”。那线在空中扭曲、挣扎，仿佛有生命一般。持杆的两人立刻将长杆对准它，杆头射出两道细小的电弧，将“线”牢牢锁住。


  “成了。”跪着的人喘息着，“这一缕‘源质微粒’，纯度不低。”


  “装进容器。”左侧的人从怀里掏出一个巴掌大的金属盒，盒身刻满细密的纹路。


  就在他们准备将那缕微粒装入盒中的瞬间，洞穴深处传来一声低吼。


  那不是人类的声音。


  那声音低沉、厚重，像是从地底深处传来，带着某种原始的、纯粹的凶性。整个洞穴都开始震动，钟乳石上的黏液如雨般滴落。石台上的光芒骤然熄灭，那缕被锁住的微粒剧烈挣扎起来，挣脱了电弧的束缚，化作一道金光，射向洞穴深处。


  “该死！”跪着的人怒吼，“是‘守墓兽’！”


  三人同时后退，长杆对准黑暗深处。洞穴的震动越来越强，石壁开始剥落，碎石如雨点般砸落。他看见黑暗深处亮起两点猩红的光——那是眼睛，每一只都有拳头大小，正缓缓向这边移动。


  他握紧了短刃。


  刀柄上的符文似乎在微微发烫。


  他不知道自己该做什么。是趁机离开，还是……他看向那三个人，看向他们手中的长杆和金属盒。他们身上有微粒，他们知道这是什么地方，他们知道“渡口”和“天堑”。


  他需要信息。


  而信息，往往需要用血来换。


  守墓兽从黑暗中现身。


  那是一头巨大的、难以形容的生物。它有着类似蜥蜴的躯干，但四肢粗壮如柱，覆盖着厚重的、泛着金属光泽的鳞片。它的头部没有眼睛，只有那两个猩红的光点嵌在额骨的位置，下方是一张裂开到耳根的巨口，里面层层叠叠的利齿在暗绿色荧光下泛着寒光。


  它每一步落下，地面都为之震颤。


  “散开！”跪着的人吼道，“用‘裂解电弧’攻击关节！”


  两道电弧射出，打在守墓兽的前肢关节处。鳞片炸开，露出下面暗红色的血肉，但伤口很快就被一层新生的、半透明的薄膜覆盖。守墓兽发出一声愤怒的咆哮，巨尾横扫，将左侧持杆的人直接拍飞出去。


  那人的身体撞在石壁上，骨骼碎裂的声音清晰可闻。他滑落在地，抽搐两下，便不再动弹。


  机会。


  他从阴影中冲出。


  动作快得像一道黑色的闪电。影迹潜行状态下，他的脚步声被彻底抹去，身体与黑暗融为一体，直到短刃的刀尖逼近右侧持杆者的后颈，对方才惊觉。


  但已经晚了。


  刀锋划过喉咙，没有声音，只有温热的液体喷溅而出。他顺势夺过长杆，反手刺向跪着的人。那人反应极快，侧身避开，长杆擦着他的肩膀划过，在长袍上留下一道焦黑的痕迹。


  “你是谁？！”跪着的人后退，手中多出一把匕首，刀刃上同样刻着符文。


  他没有回答。


  守墓兽的巨爪拍下，他翻滚避开，石台被砸得粉碎。碎石飞溅中，他看见那缕金色的微粒在空中飘浮，像一条受惊的小鱼。跪着的人也看见了，他扑向微粒，但守墓兽的尾巴再次扫来，逼得他不得不后退。


  他冲向微粒。


  守墓兽的猩红光点转向他。巨口张开，一股腥臭的、带着腐蚀性的液体喷涌而出。他侧身翻滚，液体擦过他的左臂，瞬间烧穿了衣物，在皮肤上留下一道焦黑的灼痕。


  疼痛刺激着他的神经。


  体内那粒冰冷的微粒突然剧烈震动起来。


  一股寒意从胸腔深处爆发，沿着血管蔓延至全身。左臂的灼痛感瞬间被压制，取而代之的是一种冰冷的、麻木的感觉。他看见自己的皮肤表面浮现出一层极淡的、几乎看不见的暗蓝色光泽。


  守墓兽的爪子再次拍下。


  他没有躲。


  短刃向上刺出，刀尖对准爪心最柔软的部位。刀锋没入血肉的瞬间，他感觉到体内微粒的震动达到了顶峰。一股冰冷的力量从刀身爆发，顺着伤口灌入守墓兽体内。


  守墓兽发出一声凄厉的哀嚎。


  它的爪子开始结冰。暗蓝色的冰晶从伤口处蔓延，迅速覆盖了整个前肢，并向躯干扩散。它挣扎着后退，冰晶碎裂，带下大块血肉，但它已经失去了平衡，轰然倒地。


  洞穴里安静下来。


  只有守墓兽粗重的喘息声，和冰晶继续蔓延的细微碎裂声。


  他站在原地，喘息着。左臂的灼伤还在，但那股冰冷的力量正在缓慢修复伤口，像一层无形的薄膜覆盖在创面上。他看向手中的短刃——刀身上的符文此刻正散发着微弱的暗蓝色光芒，与体内微粒的震动频率完全一致。


  跪着的人从碎石堆中爬起。


  他的一条腿已经断了，只能拖着身体向后挪动。他盯着他，眼中充满了恐惧和……贪婪。


  “你体内有‘源种’……”他嘶声道，“不可能……‘源种’早在第三次天堑崩塌时就灭绝了……”


  他没有听懂。


  但他知道，这个人不能留。


  他走向他。跪着的人挣扎着举起匕首，但手臂颤抖得厉害。他挥刀，短刃斩断匕首，刀锋顺势划过对方的喉咙。鲜血喷涌，那人瞪大眼睛，喉咙里发出“咯咯”的声音，最终瘫软下去。


  洞穴里只剩下他一个人。


  还有那缕金色的微粒。


  它依旧飘浮在空中，缓缓旋转，散发着温暖而诱人的光泽。他伸出手，指尖触碰到它。微粒微微一颤，随即化作一道流光，钻入他的掌心。


  一股暖流沿着手臂蔓延至全身。


  与体内那粒冰冷的微粒不同，这股暖流温和而充盈，像干涸的土地迎来了久违的雨水。他感觉到自己的体力在恢复，左臂的灼伤加速愈合，甚至连精神都清明了几分。


  他看向地上的三具尸体。


  从他们身上，他搜出了那个金属盒，还有几枚刻着奇怪符号的金属片。金属盒是空的，但盒身上的纹路让他想起短刃上的符文。金属片则沉甸甸的，表面泛着暗哑的光泽，像是某种货币。


  他收起这些东西，最后看向守墓兽。


  它已经死了。冰晶覆盖了它的半个身体，猩红的光点彻底熄灭。他从它爪子上拔出短刃，刀身上的暗蓝色光芒已经消退，符文恢复成普通的刻痕。


  他转身，走向洞穴的另一端。


  那里有一条向上的通道，尽头有微弱的天光透入。


  他需要离开这里。


  他需要知道，自己是谁，体内的微粒是什么，短刃上的符文又代表着什么。


  他需要知道，什么是天堑，什么是内宇宙，什么是微粒。


  他踏进通道，最后回头看了一眼这个洞穴。


  石台粉碎，尸体横陈，守墓兽化作冰雕。暗绿色的荧光依旧在闪烁，像无数只眼睛在黑暗中注视着他。


  他握紧短刃，走向光明。


