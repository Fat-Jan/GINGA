  # 第4章 · 骨缝里的沙砾


  痛觉不是从皮肤表面传来的，而是像无数根烧红的铁针，从骨髓深处向外穿刺。无明在黑暗中睁开眼，视野里没有光，只有灰败的尘埃在空气中缓慢沉降。他躺在一片碎裂的黑曜石地面上，四周是断裂的石柱和扭曲的金属残骸，仿佛某种巨大生物死后腐烂的骨架。空气粘稠得令人窒息，带着铁锈和陈旧血液混合的腥甜味。他试图起身，肌肉却像灌了铅一样沉重，每一次呼吸都伴随着胸腔内细微的撕裂声。


  他低头看向自己的双手，指节苍白，皮肤下隐约可见青黑色的血管搏动。那不是正常的血流，而是一种浑浊的、带有颗粒感的物质在皮下蠕动。他记得自己叫无明，或者这只是别人赋予他的代号？记忆是一片空白的荒原，唯有手中紧握的那柄短刃传来冰冷的触感，成为他与这个世界唯一的真实连接。短刃通体漆黑，刃口处刻满了细密如蚁穴般的古老符文，那些符文此刻正散发着微弱的幽蓝光芒，像是在呼吸，又像是在饥渴地吞噬着周围的光线。


  无明猛地握紧刀柄，指尖因用力而发白。随着他的动作，短刃上的符文骤然亮起，一股寒意顺着手臂逆流而上，直冲心脏。与此同时，他感到体内那股躁动的异物感开始剧烈翻腾。那是“微粒”，这个世界的通货，也是诅咒。他能感觉到它们在他的血液里横冲直撞，试图寻找出口，却又被某种无形的规则强行禁锢在躯壳之内。这种禁锢让他感到恶心，仿佛身体不再属于自己，而是一个装满危险货物的容器。


  他踉跄着站起身，脚下的黑曜石发出清脆的碎裂声。周围的环境死寂得可怕，连风声都被某种厚重的屏障隔绝在外。这里是天堑的边缘，传说中连接四重宇宙的裂隙之地。据说在这里，物理法则变得脆弱不堪，现实与虚幻的界限模糊不清。无明眯起眼睛，努力聚焦视线，发现远处的地平线上悬挂着一轮暗红色的太阳，它不像是在发光，更像是一个巨大的伤口，不断渗出浓稠的血雾。血雾中隐约可见漂浮的城市轮廓，那些城市如同寄生在巨兽尸体上的菌落，闪烁着诡异的光芒。


  突然，一阵剧烈的眩晕袭来，无明单膝跪地，大口喘息。体内的微粒开始失控，它们不再安分地流淌，而是聚集在他的左肩胛骨附近，形成一团灼热的肿块。他咬紧牙关，冷汗顺着额头滑落，滴在黑色的岩石上，瞬间蒸发成白色的雾气。他意识到，这些微粒并非自然生成，而是被人为植入的。这是一种标记，也是一种枷锁。在这个被规则怪谈支配的世界里，每一个拥有微粒的人都是猎物，或者是猎手。而他，显然正处于两者之间的灰色地带。


  无明举起短刃，将刀刃贴近左肩。符文的光芒变得更加耀眼，仿佛在回应他内心的杀意。他深吸一口气，猛地将刀刃刺入那团灼热的肿块之中。没有鲜血流出，只有一阵刺耳的嘶鸣声响起，像是金属摩擦玻璃的声音。紧接着，几颗细小的、闪烁着银光的微粒从伤口中迸射而出，悬浮在半空中。它们轻盈地舞动着，散发出诱人的光泽，仿佛在邀请他去捕捉，去占有。


  无明伸出左手，掌心向上，那些微粒似乎受到了某种牵引，缓缓落入他的掌心。就在接触的一瞬间，一股暖流涌入他的四肢百骸，原本沉重的身体顿时轻松了许多。然而，随之而来的是一种更深的空虚感。他看着掌心中那三颗微小的光点，心中涌起一股难以言喻的渴望。他知道，这只是开始。在这个总量硬上限为八亿四千万的世界裡，每一粒微粒都代表着权力、生存，甚至是神性。而他，刚刚迈出了掠夺的第一步。


  远处传来了低沉的脚步声，沉重而缓慢，每一步都踏在心跳的节奏上。无明迅速收起短刃，身形融入阴影之中。影迹潜行的本能在他体内苏醒，他的气息瞬间消失，仿佛从未存在过。他屏住呼吸，目光死死盯着声音传来的方向。在那片血雾弥漫的尽头，一个高大的身影缓缓浮现，身上披着由无数微粒编织而成的长袍，脸上戴着一张没有任何五官的白色面具。那人手中提着一盏灯笼，灯笼里燃烧的不是火焰，而是无数挣扎的灵魂。


  无明的心跳加速，但他强迫自己保持冷静。他知道，这个人就是“微粒掠夺集团”的成员，是这片土地上最危险的掠食者。而他，必须活下去，不仅要找回失去的记忆，更要揭开这具身体里隐藏的秘密。短刃上的符文再次闪烁，这一次，光芒中多了一丝凶戾的红意。无明嘴角勾起一抹冷酷的弧度，眼中的迷茫逐渐消散，取而代之的是猎人锁定猎物时的专注与残忍。


