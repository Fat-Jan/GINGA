  # 第9章 · 骨缝里的低语


  寒冷不是从皮肤表面渗入的，而是从骨髓深处炸开的。


  无明睁开眼时，视野是一片浑浊的灰白。没有天空，只有厚重得仿佛能压碎肺叶的铅云，云层间偶尔撕裂出一道暗红色的闪电，像是一只濒死巨兽抽搐的眼睑。他躺在一片由黑曜石碎片和腐烂金属构成的斜坡上，身下是粘稠的、散发着铁锈与陈旧血腥味的泥沼。每一次呼吸，肺部都像被砂纸打磨过一样剧痛，喉咙里涌上一股甜腻的铁腥味。


  他试图坐起，但左臂传来一阵令人牙酸的断裂声。那不是骨头折断的声音，更像是某种硬物在肌肉纤维中强行挤开一条通道。无明低下头，看向自己的左手小臂。那里的皮肤呈现出一种病态的青紫色，皮下隐约可见无数细小的光点在游走，它们如同拥有独立意识的寄生虫，沿着静脉血管逆流而上，直逼心脏。


  这就是那些人在他身上留下的东西。


  记忆依旧是一片空白，像是一块被火烧焦的羊皮卷，只剩下边缘残存的灰烬。但他记得那种感觉——冰冷的针头刺入后颈，液体注入时的灼烧感，以及最后那个戴着面具的人在他耳边低语：“这是‘种子’，也是‘枷锁’。”


  无明咬紧牙关，右手本能地摸向腰间。指尖触碰到那柄短刃冰凉的刀柄时，一股奇异的安宁感瞬间流过全身。短刃上的古老符文在昏暗的光线下微微闪烁，仿佛在回应着他体内那股躁动的力量。他握住刀柄，指节因为用力而发白，刀刃出鞘半寸，发出一声清脆的金属鸣响。这声音在这死寂的废墟中显得格外刺耳，但也正是这声音，让他确认了自己还活着，确认了这具躯壳依然属于自己。


  周围的环境压抑得令人窒息。这是一座废弃城市的边缘，高耸的建筑残骸如同巨人的肋骨，直插云霄。墙壁上布满了黑色的苔藓状物质，它们在微风中轻轻蠕动，散发出淡淡的荧光。空气中弥漫着一种难以言喻的静电味道，那是高浓度微粒残留的迹象。在这里，每一口空气都带着毒性，每一寸土地都埋藏着死亡。


  无明挣扎着站起身，双腿有些虚浮。体内的光点开始加速流动，带来一阵强烈的眩晕感。他感到一种饥饿，不是对食物的渴望，而是对能量的贪婪。那些光点在吞噬他的生命力，同时也赋予他一种诡异的敏锐。他能听到远处风穿过废墟空洞的呜咽声，能闻到百米外一只变异鼠类尸体腐烂的气味，甚至能感觉到脚下大地深处传来的微弱震动。


  这种感官的放大让他感到恐惧，但也让他兴奋。这是一种危险的力量，就像是在悬崖边缘行走，稍有不慎就会坠入深渊。但他别无选择。在这个被规则怪谈支配的世界里，弱者连成为尸体的资格都没有，只能沦为强者的养料。


  他环顾四周，目光锁定在前方的一座坍塌的神殿遗址上。那里似乎有某种能量波动，与他体内的光点产生了共鸣。直觉告诉他，那里可能有解开这一切的关键，或者至少，能找到压制这些光点的方法。


  无明迈开脚步，每一步都踩在破碎的石板上，发出沉闷的声响。他的身影在灰色的雾气中若隐若现，如同一个幽灵。影迹潜行的能力在这一刻自动激活，他的气息变得淡薄，几乎与环境融为一体。这是他在无数次生死搏杀中练就的本能，即使失去了记忆，身体依然记得如何隐藏，如何杀戮。


  然而，就在他即将踏入神殿阴影的那一刻，一阵细微的脚步声从侧后方传来。


  无明猛地停下脚步，身体紧绷如弓弦。他没有回头，而是通过地面的震动判断出来者的数量和位置。三个人，步伐轻盈但杂乱，显然是受过训练但并非顶尖高手。他们身上带着浓烈的汗臭味和劣质烟草的味道，这是底层拾荒者特有的气息。


  “嘿，老大，你看那边。”一个沙哑的声音响起，带着掩饰不住的兴奋，“有个落单的家伙，看起来受伤不轻。”


  “别急，小心有诈。”另一个声音较为沉稳，但同样充满了贪婪，“在这种地方，单独行动的不是疯子就是死人。先看看他手里有什么。”


  无明缓缓转过身，手中的短刃已经完全出鞘。刀刃在昏暗的光线下反射出冷冽的光芒，符文流转，仿佛有生命一般在呼吸。他面无表情地看着从迷雾中走出的三个身影。他们穿着破烂的防护服，脸上戴着简易的防毒面具，手中拿着粗糙的铁棍和改装过的弩箭。


  为首的是一个身材魁梧的男人，他的左眼是一只机械义眼，闪烁着红光。他盯着无明，嘴角露出一丝残忍的笑容。“小子，把你手里的刀交出来，我们可以让你死得痛快一点。”


  无明没有说话，只是冷冷地看着他们。他的眼神空洞而深邃，仿佛在看三具已经死亡的尸体。体内的光点在这一刻剧烈跳动起来，一股狂暴的力量涌遍全身。他感到一种前所未有的冲动，想要撕碎眼前的一切，想要将那三个人的血肉吞食殆尽。


  “看来是个哑巴。”魁梧男人啐了一口唾沫，挥了挥手，“动手！留活口，我要看看他脑子里有没有值钱的信息。”


  另外两人立刻举起弩箭，瞄准了无明的要害。与此同时，魁梧男人挥舞着铁棍，如同一头暴怒的公牛般冲了过来。


  无明动了。


  他的动作快得超出了常人的理解范围。在弩箭射出的瞬间，他已经侧身避开，短刃在空中划出一道优美的弧线，精准地切断了其中一根弩箭的箭杆。紧接着，他身形一闪，如同鬼魅般出现在左侧那名拾荒者的面前。


  那名拾荒者惊恐地瞪大了眼睛，还没来得及做出反应，短刃已经刺入了他的咽喉。鲜血喷涌而出，溅在无明的脸上，温热而粘稠。无明没有任何停顿，拔出短刃，顺势一脚踢在对方的胸口，将其踹飞出去，撞倒了另一名正在装填弩箭的同伴。


  魁梧男人怒吼一声，铁棍带着呼啸的风声砸向无明的头部。无明低头避过，铁棍擦着他的头皮飞过，砸在地上，激起一片碎石。他趁机欺身而上，短刃直刺对方的腹部。


  然而，魁梧男人的反应出乎意料的快。他猛地扭转身躯，用肩膀硬接了这一击。短刃刺入他的肩胛骨，发出令人牙酸的摩擦声。魁梧男人闷哼一声，眼中闪过一丝狠厉，左手抓住无明的衣领，将他狠狠甩向旁边的石柱。


  无明重重地撞在石柱上，背部传来一阵剧痛。他咳出一口血，但眼中的凶性却愈发旺盛。体内的光点在这一刻达到了顶峰，它们不再仅仅是游走，而是开始沸腾，仿佛要冲破皮肤的束缚。


  “有点意思。”魁梧男人捂着肩膀，鲜血顺着指缝流出，但他脸上的笑容却更加狰狞，“看来你也是个怪物。”


  无明缓缓站起身，擦去嘴角的血迹。他看着手中的短刃，发现刀刃上的符文变得更加明亮，仿佛在欢呼，在渴望更多的鲜血。他感到一种陌生的愉悦感，那是杀戮带来的快感，是力量释放后的宣泄。


  “你们……不该来。”无明的声音沙哑而低沉，像是从地狱深处传来的回响。


  他再次冲向魁梧男人，这一次，他的速度更快，力量更强。短刃在空中舞出一片银色的光幕，每一击都直指要害。魁梧男人虽然勇猛，但在无明这种不要命的打法面前，逐渐露出了败象。他的铁棍几次挥空，身上的伤口越来越多，鲜血染红了地面。


  最终，在一次交锋中，无明抓住了对方的破绽，短刃贯穿了魁梧男人的心脏。男人瞪大了眼睛，难以置信地看着胸口的利刃，随后无力地倒下。


  剩下的两名拾荒者早已吓得魂飞魄散，转身就想逃跑。但无明没有给他们机会。他身形一闪，出现在其中一人的身后，短刃划过对方的脖颈。另一人刚跑出几步，就被无明掷出的短刃钉在了背上，当场毙命。


  战斗结束得很快，也很残酷。


  无明站在三具尸体中间，大口喘着粗气。体内的光点渐渐平息下来，重新恢复了游走的节奏。他感到一阵虚弱，但同时也感到一种充实。那些光点似乎在吸收死者残留的生命力，转化为某种能量，储存在他的体内。


  他走到魁梧男人的尸体旁，蹲下身，开始搜刮战利品。除了少量的食物和水，他还找到了一袋沉甸甸的东西。打开一看，里面是十几颗晶莹剔透的微粒。这些微粒散发着柔和的光芒，在这个黑暗的世界里显得格外珍贵。


  无明拿起一颗微粒，放在掌心仔细观察。微粒内部仿佛有一个微缩的宇宙在运转，星辰生灭，万物轮回。他感到一种莫名的熟悉感，仿佛曾经无数次接触过这种东西。


  就在这时，他体内的光点突然剧烈跳动起来，那颗微粒竟然主动飞向了他的手掌，然后融入他的皮肤，消失不见。无明感到一股暖流涌入体内，原本虚弱的感觉瞬间消散，取而代之的是一种强大的力量感。


  他惊讶地看着自己的手掌，又看了看剩下的微粒。他尝试着拿起另一颗，同样的事情发生了。微粒融入体内，转化为能量。


  无明意识到，这些微粒不仅仅是通货，更是力量的源泉。而他体内的光点，似乎是一种特殊的容器，能够储存和转化这种力量。


  他将剩下的微粒全部收起，放入怀中。然后，他站起身，看向那座坍塌的神殿。体内的光点再次指向那里，仿佛在催促他前进。


  无明深吸一口气，迈步走向神殿。他知道，前方的道路将更加危险，但他已经没有退路。在这个被规则支配的世界里，唯有不断变强，才能生存下去。而他体内的秘密，或许就藏在那座神殿之中。


  神殿的大门已经坍塌，只剩下一个巨大的黑洞洞的入口。入口处弥漫着一股浓郁的霉味和某种说不清道不明的香气。无明握紧短刃，小心翼翼地走了进去。


  内部比外面更加黑暗，只有墙壁上的一些发光苔藓提供着微弱的光源。地面上铺满了厚厚的灰尘，脚印凌乱，显然近期有人来过。无明警惕地观察着四周，耳朵捕捉着任何细微的声响。


  在大厅的中央，矗立着一座巨大的雕像。雕像的面容模糊不清，但姿态却显得无比庄严。雕像的手中捧着一个球体，球体内部闪烁着耀眼的光芒，与无明体内的光点遥相呼应。


  无明走近雕像，感受到一股强大的压迫感。他伸出手，想要触碰那个球体。就在指尖即将接触的一瞬间，一个声音在他脑海中响起：


  “你终于来了，继承者。”


  无明猛地收回手，环顾四周，却看不到任何人影。


  “谁？”他低声问道。


  “我是这座神殿的守护者，也是你命运的指引者。”那个声音继续说道，带着一丝沧桑和悲凉，“你体内的‘种子’已经发芽，是时候让它开花结果了。”


  无明皱起眉头，心中的警惕更甚。“什么种子？什么命运？”


  “你忘记了一切，但这并不重要。”声音回答道，“重要的是，你必须找回你的过去，才能掌控你的未来。而这一切的答案，都藏在内宇宙的深处。”


  内宇宙？无明心中一动。这个词对他来说既陌生又熟悉，仿佛是一把钥匙，打开了记忆深处的某扇门。


  “告诉我，我该怎么做？”无明问道。


  “穿过天堑，寻找四重封印。”声音说道，“每解开一道封印，你就能恢复一部分记忆，同时获得更强的力量。但你要小心，微粒掠夺集团不会放过你，他们是规则的维护者，也是秩序的破坏者。”


  话音刚落，雕像手中的球体突然爆裂开来，化作无数光点，涌入无明的体内。无明感到一阵剧烈的疼痛，仿佛灵魂被撕裂一般。他跪倒在地，双手抱头，发出痛苦的嘶吼。


  在意识陷入黑暗之前，他看到了一幅画面：一座巨大的城市悬浮在虚空之中，城市中的人们生活在严格的规则之下，每个人身上都连接着无数的管线，输送着微粒。而在城市的顶端，坐着一个身穿黑袍的身影，正冷漠地注视着下方的一切。


  那是谁？


  无明不知道答案。但他知道，从这一刻起，他的命运已经与这个世界紧密相连。他不再是那个失忆的刺客，而是一个即将掀起风暴的变量。


  当他再次醒来时，发现自己躺在神殿的出口处。天色已经微亮，铅云散去了一些，露出了一丝惨白的阳光。他摸了摸胸口，发现那里多了一个奇怪的印记，形状像是一朵绽放的花朵。


  他站起身，拍了拍身上的灰尘。体内的光点变得更加活跃，力量也更加充沛。他看了一眼远处的地平线，那里是天堑的方向。


  无明握紧短刃，嘴角勾起一抹冷酷的笑容。


  游戏，才刚刚开始。


