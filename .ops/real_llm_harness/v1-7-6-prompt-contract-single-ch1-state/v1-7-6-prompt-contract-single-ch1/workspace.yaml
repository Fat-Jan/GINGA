  | **当前微粒** | 0（初始状态，体内残留未知微粒未结算） |

  | **预计微粒变化** | +1200（击杀三名剥皮匠，掠夺其核心微粒） |

  | **主要冲突** | 个体存续本能 vs 规则怪谈式的血脉收割机制；记忆缺失带来的身份焦虑 vs 杀戮肌肉记忆的复苏。 |


  # 第一章 · 天堑之下的血肉契约


  冷风如钝刀刮过裸露的脊背，带来一种黏腻而腥甜的触感。无明并未睁眼，他的意识在黑暗的冰层下潜行，首先恢复的不是视觉，而是对疼痛的敏锐感知。左肋下方三寸处，有一团灼热的异物正在搏动，像是第二颗心脏，却比原本的心跳更加狂乱、贪婪。那并非血液流动的温热，而是一种更为细微、更为尖锐的物质在血管壁内摩擦产生的刺痛感——微粒。这个词汇如同生锈的铁钉，强行楔入他空白的脑海，伴随着一阵剧烈的眩晕。


  他猛地睁开双眼，瞳孔在昏暗中急剧收缩。眼前并非熟悉的床榻或牢笼，而是一片灰败的荒原。天空呈现出病态的紫灰色，厚重的云层低垂，仿佛随时会坍塌下来，将这片土地碾碎。远处，一道深不见底的裂痕横亘在地平线上，那是“天堑”。传说中分割生者与死者、秩序与混沌的界限。此刻，天堑边缘涌动着黑色的雾气，那些雾气并非静止，而是在缓慢地蠕动、吞噬着周围的一切物质。无明低下头，发现自己正跪在一块巨大的黑色岩石上，岩石表面刻满了扭曲的纹路，隐隐散发着令人作呕的热气。


  他的手中紧紧攥着一把短刃。刀身漆黑，没有任何光泽，唯有刀柄处镶嵌着几枚暗红色的宝石，此刻正随着他体内那团异物的搏动而忽明忽暗。无明试图回忆自己是谁，为何在此，但脑海中只有一片虚无的白噪音。这种存在性的恐惧比肉体的寒冷更让他战栗。他下意识地握紧短刃，指节因用力而发白。就在这一瞬间，刀身上的古老符文似乎感应到了主人的杀意，微微震颤了一下，发出一声低沉的嗡鸣。这声音并不响亮，却直接穿透了耳膜，在他的颅骨内回荡，激起一阵莫名的熟悉感。


  “醒了？真是命硬。”


  一个沙哑的声音从侧后方传来，带着毫不掩饰的轻蔑与贪婪。无明没有回头，他的身体比思维更快做出了反应。肌肉紧绷，重心下沉，整个人如同一张拉满的弓，蓄势待发。这是刻在骨子里的本能，即便记忆已逝，但这具躯体依然记得如何杀人。


  三个身影从灰色的雾气中走出。他们身穿破烂的黑袍，脸上戴着由人皮缝制的面具，面具上的五官被刻意拉长，显得诡异而恐怖。他们的腰间挂着各种奇形怪状的器具：钩子、锯子、以及装满浑浊液体的玻璃瓶。为首的一人手中提着一盏昏黄的灯笼，灯光摇曳，照亮了他手中那把沾满黑血的剔骨刀。


  “编号七四九，‘种猪’候选人。”那人咧嘴一笑，露出满口黄黑的烂牙，“没想到还能从天堑的风暴里爬出来。看来你体内的‘源质’纯度不错，值得多费点功夫。”


  无明听不懂这些术语，但他听懂了语气中的恶意。那种将他视为物品、视为资源的眼神，让他体内的怒火瞬间点燃。那股灼热的异物感再次加剧，仿佛要冲破皮肤喷涌而出。他感到自己的血液在沸腾，每一个细胞都在尖叫着渴望释放。


  “闭嘴。”无明的声音嘶哑，如同砂纸磨过粗糙的石面。


  黑袍人愣了一下，随即爆发出一阵刺耳的笑声。“还会说话？有意思。兄弟们，动作快点，别弄坏了‘容器’。城主等着这批新的‘血裔’呢，要是耽误了繁衍契约的签订，咱们都得去填天堑。”


  话音未落，左侧的一名黑袍人已率先扑来。他的动作迅捷如蛇，手中的铁钩直取无明的咽喉。无明侧身闪避，铁钩擦着他的脸颊划过，带起一串血珠。鲜血滴落在黑色的岩石上，瞬间被吸收殆尽，连一丝痕迹都未留下。无明心中一凛，这块岩石在吸食血液？


  他没有时间思考，身体的本能接管了一切。他反手挥动短刃，刀锋在空中划出一道漆黑的弧线。然而，预想中的切割声并未出现，短刃仿佛砍进了粘稠的胶水中，阻力极大。黑袍人的黑袍下似乎隐藏着某种坚硬的甲壳，短刃只在上面留下了一道浅浅的白痕。


  “哼，凡铁也想伤我？”黑袍人狞笑着，另一只手掏出一个小瓶，向无明泼洒过来。瓶中飞出的不是液体，而是无数细小的黑色颗粒，它们在空中凝聚成一张网，向无明罩来。


  无明瞳孔骤缩。那些黑色颗粒给他带来了极大的压迫感，仿佛每一粒都蕴含着毁灭性的力量。他向后跃开，但那张网的速度极快，瞬间笼罩了他的上半身。黑色的颗粒接触到皮肤的瞬间，一股冰冷的麻痹感迅速蔓延。无明感到自己的动作变得迟缓，思维也开始模糊。


  “这就是‘微粒’的力量。”为首的黑袍人缓缓走近，手中的剔骨刀在地上拖曳，发出刺耳的声响，“在这个世界，没有微粒，你就是蝼蚁。乖乖交出你体内的源质，或许还能留你一条全尸，成为城主的玩物。”


  无明咬紧牙关，强忍着麻痹感。他感觉到体内的那团异物正在疯狂跳动，仿佛在抗议这种束缚。短刃上的符文开始发热，红光越来越盛，甚至透过黑袍人的面具都能感受到那股炽热的气息。


  “不……”无明从喉咙深处挤出一个字。


  他猛地发力，体内的微粒仿佛受到了召唤，顺着手臂涌入短刃。短刃上的符文骤然亮起，不再是微弱的红光，而是耀眼的赤金色光芒。光芒所过之处，那些黑色的颗粒网瞬间崩解，化作点点星光消散在空气中。


  黑袍人们大惊失色。“怎么可能？他还没有经过‘启蒙’，怎么能操控微粒？”


  无明没有给他们反应的机会。他身形一闪，如同鬼魅般出现在最近的一名黑袍人身前。短刃刺出，这一次，没有任何阻力。刀尖轻易地穿透了黑袍人的胸膛，从后背透出。黑袍人瞪大了眼睛，难以置信地看着胸口的伤口，那里没有鲜血流出，只有无数细小的金色光点从中逸散出来，被短刃贪婪地吸收。


  “啊——！”黑袍人发出一声凄厉的惨叫，身体迅速干瘪下去，仿佛所有的生命力都被抽空。短短几秒钟，他就变成了一具枯槁的尸体，瘫软在地。


  另外两名黑袍人吓得连连后退。“怪物！他是怪物！”


  无明拔出短刃，刀身上的符文光芒渐渐黯淡，但他能清晰地感觉到，一股暖流顺着刀柄流入体内，填补了之前的空虚感。那种灼热的异物感减轻了许多，取而代之的是一种充盈的力量感。他看了一眼地上的尸体，心中没有丝毫波澜，只有冰冷的理智在计算着下一步的行动。


  “跑？你们跑得掉吗？”无明的声音依旧冰冷，但其中多了一丝嗜血的兴奋。


  剩下的两名黑袍人对视一眼，眼中闪过一丝狠厉。他们知道，今天若不能拿下这个“种猪”，回去也是死路一条。两人同时从怀中掏出一枚黑色的晶体，捏碎后吞入腹中。刹那间，他们的身体开始膨胀，肌肉隆起，皮肤表面浮现出黑色的鳞片，双眼变成了猩红色。


  “既然你要找死，那就成全你！”其中一人咆哮着，挥舞着巨大的拳头砸向无明。拳风呼啸，带着沉重的压力。


  无明眯起眼睛，他能感觉到对方体内微粒的流动轨迹。这是一种全新的感知方式，仿佛整个世界在他眼中变成了由无数线条和光点构成的网络。他看到了对方动作中的破绽，看到了微粒聚集的核心位置。


  他没有硬接这一拳，而是侧身滑步，短刃沿着对方手臂的内侧划过，精准地切断了对方肘部的肌腱。黑袍人发出一声闷哼，手臂无力地垂下。无明趁机欺身而上，短刃直刺对方的心脏。


  然而，另一名黑袍人从侧面袭来，手中的锯子砍向无明的腰部。无明不得不放弃攻击，向后翻滚躲避。锯子擦着他的腰侧划过，割破了衣物，留下一道深深的血痕。疼痛刺激着他的神经，也让他的头脑更加清醒。


  这两人配合默契，显然受过严格的训练。无明意识到，单凭现在的状态，很难在短时间内解决他们。他需要更多的力量，更多的微粒。


  他深吸一口气，闭上眼睛，感受着体内那股涌动的力量。短刃上的符文再次亮起，这一次，光芒更加稳定，更加深邃。他不再盲目地释放微粒，而是尝试着引导它们，将它们压缩、凝聚，附着在刀锋之上。


  当无明再次睁开眼时，他的双眸中也闪烁着淡淡的金光。他看向两名黑袍人，嘴角勾起一抹冷酷的弧度。


  “游戏结束了。”


  他身形暴起，速度快得几乎留下了残影。短刃在空中划出两道交叉的光弧，分别斩向两人的咽喉。黑袍人们惊恐地想要躲避，但他们的动作在无明眼中慢得像是在水中行走。


  噗嗤。


  两颗头颅冲天而起，黑色的血液喷洒而出，染红了灰色的天空。两具无头尸体摇晃了几下，轰然倒地。


  无明站在原地，大口喘着粗气。体内的微粒仍在躁动，但他已经能够勉强控制它们。他走到尸体旁，用短刃挑开他们的衣襟，发现他们的胸口处都有一个黑色的印记，形状如同一个扭曲的胚胎。


  “繁衍契约……”无明喃喃自语，脑海中闪过一些破碎的画面。高大的城墙，拥挤的人群，还有无数婴儿的啼哭声。那些画面充满了压抑与绝望，仿佛整个城市都是一座巨大的养殖场，人类只是被圈养的牲畜，唯一的价值就是繁衍后代，提供“源质”。


  他感到一阵恶心，但更多的是愤怒。这种被支配、被剥削的命运，让他无法接受。


  就在这时，远处的天堑边缘传来了一阵沉闷的轰鸣声。黑色的雾气变得更加浓重，仿佛有什么巨大的东西正在靠近。无明抬头望去，只见雾气中隐约可见一座宏伟而阴森的城市轮廓。那座城市的建筑风格怪异，高耸的塔楼如同利剑般刺向天空，城墙之上布满了密密麻麻的孔洞，像是无数只眼睛在注视着这片荒原。


  城门缓缓打开，一队身穿银色铠甲的士兵走了出来。他们的盔甲上刻满了复杂的符文，手中持有长枪，枪尖闪烁着寒光。为首的是一名骑着黑色战马的骑士，他的面容隐藏在头盔之下，只露出一双冰冷的眼睛。


  骑士的目光扫过地上的尸体，最后停留在无明身上。他没有表现出惊讶，也没有愤怒，只是淡淡地说道：“编号七四九，违规逃脱。根据《血脉管理法》第三条，予以就地格杀。”


  无明握紧短刃，体内的微粒再次涌动。他知道，真正的战斗才刚刚开始。这座城市，这个规则怪谈般的世界，不会轻易放过任何一个试图挣脱枷锁的灵魂。


  但他不在乎。因为他已经找回了一样东西——那就是活下去的意志，以及手中这把能够吞噬一切的短刃。


  骑士举起长枪，指向无明。“投降，或者死亡。”


  无明冷笑一声，脚下的黑色岩石突然碎裂，他整个人如同一颗炮弹般冲向骑士。短刃上的符文爆发出前所未有的光芒，照亮了整个天堑边缘。


  “我选择，改写规则。”


