  # 第2章 · 蚀骨之种


  黑暗并未因少年的离去而消散，反而像粘稠的沥青般从四周挤压过来。无明没有回头确认那具瘦小躯体的去向，他的感官早已在长期的杀戮训练中剥离了多余的情感投射，只留下对危险最原始的嗅觉。他沿着湿滑的石壁向下滑行，指尖扣入岩石缝隙中那些干涸发黑的苔藓，每一次发力都伴随着肌肉纤维撕裂般的微痛。这种疼痛是真实的，是他确认自己还活着的唯一坐标。空气中弥漫着一股陈腐的铁锈味，混合着某种难以名状的甜腥，那是血液氧化后与霉菌共生的气息。天堑边缘的风声在这里被扭曲成低沉的呜咽，仿佛无数冤魂在岩层深处挣扎。无明的呼吸节奏被强行压制在每分钟六次，这是他在极度缺氧环境下维持清醒的唯一方式。他的视线穿过前方浓重的灰雾，隐约看见一座废弃哨塔的轮廓，那是一座由黑曜石堆砌而成的畸形建筑，塔尖断裂，如同被巨齿咬断的骨头，直指苍穹那片永远无法穿透的铅灰色云层。他需要在那里寻找遮蔽，更需要处理右臂上那股越来越强烈的灼烧感。那不是普通的伤口发炎，而是一种深入骨髓的侵蚀，像是有什么东西正在他的血管里生根发芽，贪婪地汲取着他仅存的生命力。他停下脚步，背靠在一块突出的岩柱后，左手缓缓抽出腰间的短刃。刀身冰冷，上面的古老符文在昏暗的光线下闪烁着幽蓝的微光，仿佛在回应着他体内那股躁动的力量。他低头看向自己的右臂，袖口已经被暗红色的血迹浸透，布料紧紧粘连在皮肤上。他用短刃锋利的尖端挑开衣袖，动作精准而冷酷，没有丝毫犹豫。当布料被割裂的那一刻，一股令人作呕的黑气从伤口处喷涌而出，随即迅速凝聚成一团不断蠕动的黑色物质。那并非血液，也不是脓液，而是一种拥有独立意识的微粒集合体。它们在他的皮下疯狂游走，形成一个个凸起的结节，每一个结节都在搏动，像是在呼吸，又像是在计数。无明的瞳孔微微收缩，他认出了这种东西——这是“蚀种”，一种只有在天堑最深层才会出现的禁忌之物。传说中，蚀种能够吞噬宿主的血肉，将其转化为纯粹的微粒能量，但代价是宿主将彻底失去自我，沦为只会本能掠夺的行尸走肉。为什么会有蚀种出现在他的体内？记忆的碎片再次刺痛他的神经，但他强行压下这股眩晕感。现在不是追溯过去的时候，而是生存的时刻。他必须在这颗种子完全成熟之前，找到遏制它的方法，或者……利用它。


  短刃上的符文开始发热，那种热度顺着刀柄传导至他的掌心，带来一阵酥麻的电流感。无明注意到，当他集中精神注视那些黑色微粒时，符文的亮度会随之增强，而那些微粒的蠕动速度则会明显减缓。这是一种共鸣，或者说，是一种压制。他尝试着将短刃贴近伤口，刀刃并未切割皮肤，而是悬停在距离表皮半寸的位置。奇迹发生了，那些原本狂暴的黑色微粒竟然像是受到了某种召唤，纷纷向刀刃方向聚集，最终被吸入刀身之中。随着微粒的涌入，短刃上的符文变得更加明亮，甚至隐隐有流光溢彩之感。与此同时，无明感到一股暖流从手臂蔓延至全身，那种被侵蚀的痛苦瞬间减轻了许多，取而代之的是一种充盈的力量感。他惊讶地发现，自己的视力似乎变得更加清晰，连远处岩壁上细微的裂纹都能看得一清二楚。这不仅仅是伤口的愈合，更是身体机能的短暂强化。然而，这种强化是有代价的。他能感觉到体内的生命力正在被快速消耗，就像是一盏油灯被拨亮了灯芯，虽然光芒更盛，但燃烧的速度也加快了。他必须尽快找到补充生命力的来源，否则等到蚀种再次爆发，他将无力抵抗。无明收起短刃，重新整理好衣袖，掩盖住那道已经愈合大半的伤口。他的眼神变得更加冷冽，之前的迷茫和恐惧被一种冰冷的算计所取代。既然这把刀能吞噬蚀种，那么它是否也能吞噬其他的东西？比如，那些潜伏在阴影中的猎杀者？他抬起头，望向那座黑曜石哨塔，嘴角勾起一抹残忍的弧度。那里一定藏着什么，也许是物资，也许是线索，也许是更多的猎物。无论是什么，他都势在必得。在这个末日世界里，同情心是奢侈品，而力量才是硬通货。他不再是一个被动逃亡的失忆者，而是一个主动出击的掠食者。他调整了一下呼吸，身形融入周围的阴影之中，如同一滴墨水落入清水，无声无息地向哨塔逼近。每一步落下，都没有发出丝毫声响，只有脚下的碎石偶尔因为受力不均而发出轻微的碎裂声，但这声音很快就被风声掩盖。他的心跳平稳而有力，每一次搏动都在为接下来的战斗积蓄能量。他知道，等待他的绝不会是一场轻松的旅程，但至少，他手中握有了反击的武器。


  哨塔的大门早已腐朽，只剩下几根扭曲的铁条勉强支撑着框架。无明侧身挤过狭窄的入口，进入了一个充满尘埃和蛛网的大厅。大厅中央矗立着一座巨大的石台，石台上摆放着一个破碎的玻璃容器，里面残留着一些黑色的液体，散发出与蚀种相似的气息。无明走近石台，仔细观察着容器底部的铭文。那些文字古老而晦涩，但他却莫名地感到熟悉，仿佛曾经无数次诵读过这些字符。他伸出手，指尖轻轻抚过那些刻痕，脑海中闪过一些模糊的画面：鲜血、火焰、以及一个女人的背影。那个女人转过身来，面容模糊不清，但她的眼神中充满了悲伤和绝望。她张开嘴，似乎在说着什么，但无明听不到任何声音。画面戛然而止，剧烈的头痛让他不得不扶住石台边缘，大口喘息。汗水顺着额头滑落，滴在满是灰尘的地面上，激起一小圈涟漪。他摇了摇头，试图甩掉这些干扰思维的幻象。现在不是沉溺于过去的时候，他必须保持绝对的冷静。他环顾四周，发现大厅的角落里堆积着一些杂物，其中有几个密封的金属罐子。他走过去，用短刃撬开其中一个罐子的盖子，里面装满了淡蓝色的晶体。这些晶体散发着柔和的光芒，给人一种宁静祥和的感觉。无明拿起一颗晶体，放在眼前仔细端详。他能感觉到晶体内部蕴含着庞大的能量，这种能量纯净而温和，与他体内那股暴虐的蚀种能量截然不同。如果将这些晶体摄入体内，或许能够中和蚀种的毒性，甚至修复受损的组织。但他不敢贸然尝试，毕竟他对这种晶体的性质一无所知。就在这时，大厅入口处传来了一阵轻微的脚步声。无明立刻警觉起来，他将晶体放回原处，身形一闪，躲到了石台后的阴影中。脚步声越来越近，伴随着粗重的呼吸声和金属摩擦的声音。显然，来人并不擅长潜行，或者说，他根本不在乎是否会被发现。无明屏住呼吸，透过石台的缝隙向外观察。只见一个身穿破烂铠甲的高大身影走了进来，他的脸上戴着一个狰狞的面具，手中握着一把沉重的战斧。那人走进大厅后，四处张望了一番，然后径直走向石台。他似乎对这里的布局非常熟悉，很快就发现了那个破碎的玻璃容器。他发出一声低沉的怒吼，举起战斧狠狠地砸向石台。碎石飞溅，玻璃碎片四处散落。那人蹲下身，在废墟中翻找着什么，嘴里嘟囔着含糊不清的话语。无明眯起眼睛，心中暗自盘算。这个人显然是冲着蚀种来的，而且他看起来并不像是普通的拾荒者，更像是一名专业的猎人。如果此时出手，胜算有多大？无明评估着自己的状态，虽然刚才吸收了一些蚀种，体力有所恢复，但面对这样一个全副武装的对手，正面交锋依然风险极大。他需要等待一个更好的时机，或者制造一个陷阱。他悄悄地将手伸向腰间，握紧了短刃。刀身上的符文再次亮起，这一次，光芒更加微弱，但却更加凝实。他感受到了一股前所未有的连接感，仿佛这把刀已经成为了他身体的一部分。他深吸一口气，准备迎接即将到来的风暴。


  那人在废墟中翻找了许久，最终失望地站起身来。他踢了一脚旁边的石块，发泄着心中的不满。然后，他转过头，目光扫过大殿的各个角落。虽然无明隐藏得很好，但那人的直觉似乎异常敏锐，他的目光在无明藏身的阴影处停留了片刻。无明的心跳加速，但他强迫自己保持静止，连呼吸都几乎停止。那人并没有立刻走过来，而是从腰间取出了一个奇怪的装置，那是一个类似罗盘的仪器，指针正在疯狂旋转。他盯着罗盘看了片刻，嘴角露出一丝冷笑。“出来吧，老鼠。”他的声音沙哑而刺耳，在大厅中回荡，“我知道你在这里。”无明没有回应，他知道一旦暴露位置，就会陷入被动。他继续潜伏在阴影中，等待着对方露出破绽。那人见无人应答，便迈开步子，一步步向石台后方走来。他的步伐沉重而缓慢，每一步都踏在地板上，发出沉闷的响声。无明计算着对方的距离，十步、九步、八步……当那人走到距离石台还有五步远的时候，无明动了。他没有选择直接攻击，而是抓起地上的一块碎石，用力扔向大厅的另一侧。碎石撞击墙壁，发出清脆的响声。那人果然上当，猛地转身，战斧挥舞出一道寒光，劈向声音传来的方向。就在这一瞬间，无明从阴影中窜出，如同一道黑色的闪电，直扑那人的后背。他的目标不是要害，而是那人手中的罗盘。短刃划过空气，带起一道凄厉的风声。那人反应极快，听到背后的动静，立刻回身格挡。战斧与短刃碰撞在一起，迸发出耀眼的火花。巨大的冲击力让无明的手臂一阵发麻，但他借着反震之力，向后跃开，拉开了距离。那人面具下的双眼闪烁着凶狠的光芒，他没想到这个看似弱小的对手竟然敢主动发起攻击。“有点意思。”他冷哼一声，再次举起战斧，摆出了进攻的姿势。无明紧握短刃，感受着刀身传来的震动。刚才的碰撞让他意识到，对方的力量远超自己，硬拼绝非明智之举。他必须利用速度和技巧，寻找对方的弱点。他绕着那人缓缓移动，目光始终锁定在对方的关节和颈部等脆弱部位。那人也不甘示弱，跟着无明的步伐转动身体，始终保持正面对敌。两人就这样在大厅中对峙着，气氛紧张到了极点。空气中的尘埃仿佛都凝固了，只有两人的呼吸声和心跳声在交织。无明知道，这场战斗注定不会轻松，但他已经没有退路。要么杀死对方，夺取资源；要么被对方杀死，成为天堑中的一具枯骨。他深吸一口气，眼中的杀意愈发浓烈。


  那人率先发动了攻击，战斧带着呼啸的风声劈向无明的头顶。无明侧身闪避，战斧擦着他的肩膀划过，在地面上留下一道深深的沟壑。碎石飞溅，划破了无明的脸颊，渗出一丝鲜血。他没有理会脸上的疼痛，反而趁着对方旧力已尽、新力未生之际，欺身而上，短刃直刺对方的肋下。那人急忙收腹后退，同时挥动左拳砸向无明的面部。无明低头躲过拳头，顺势一脚踢在对方的膝盖上。那人踉跄了一下，但没有倒下，反而更加愤怒地咆哮起来。他双手握住战斧柄，猛地横扫一圈，逼退了无明。无明连连后退，直到背部撞上墙壁才停下。他喘着粗气，看着眼前这个如同野兽般的对手，心中涌起一股寒意。这家伙不仅力量强大，而且耐力惊人，刚才的攻击几乎没有消耗他多少体力。而无明却因为之前的伤势和蚀种的影响，体力已经开始下降。如果不能速战速决，拖得越久对他越不利。他看了一眼手中的短刃，符文的光芒有些黯淡，显然刚才的吸收并没有完全恢复它的威力。他需要更多的能量，或者……更致命的一击。他注意到那人的面具下方有一道裂缝，那是之前战斗中留下的痕迹。如果能击中那里，或许能造成致命的伤害。但要做到这一点，必须让对方露出更大的破绽。无明脑海中迅速制定了一个计划。他假装体力不支，故意放慢了动作，露出了一个明显的空档。那人果然中计，眼中闪过一丝喜色，大吼一声，全力冲了过来。战斧高高举起，带着雷霆万钧之势劈下。就在战斧即将落下的瞬间，无明突然发力，身体向侧面翻滚，同时短刃向上挑起，精准地刺入了那人面具的裂缝中。只听“咔嚓”一声脆响，面具碎裂开来，露出了下面一张布满疤痕的脸。那人发出一声惨叫，捂着脸向后倒去。战斧脱手飞出，重重地砸在地上。无明没有给他喘息的机会，立刻扑上去，短刃抵住了他的喉咙。那人惊恐地看着无明，眼中充满了恐惧和不解。“你……是谁？”他艰难地问道。无明没有回答，只是冷冷地看着他。他的心中没有怜悯，只有冷漠。在这个世界里，弱者没有资格提问。他手腕轻轻一抖，短刃划过对方的咽喉。鲜血喷涌而出，染红了地面。那人的身体抽搐了几下，便不再动弹。无明站起身，擦去短刃上的血迹。他感到一阵虚弱，刚才的战斗消耗了他大量的体力。但他没有时间休息，他必须尽快处理尸体，并搜索有价值的物品。他在那人的身上摸索了一番，找到了几个装满蓝色晶体的袋子，以及一些干粮和水。此外，他还发现了一张地图，上面标注着附近几个据点的位置。无明将地图收好，然后将尸体拖到角落里，用碎石掩埋起来。做完这一切后，他坐在地上，拿出一个蓝色晶体，小心翼翼地放入口中。晶体入口即化，一股清凉的能量瞬间流遍全身。他感到体内的蚀种似乎安静了下来，那种灼烧感也减轻了许多。他闭上眼睛，享受着这片刻的宁静。但他知道，这只是暂时的平静。天堑的危险无处不在，而他体内的秘密，也将引来更多的觊觎者。他必须变得更强，才能在这末世中活下去。


