  | :--- | :--- |

  | **当前锚定** | 失忆刺客无明在天堑边缘苏醒，短刃符文异动，体内微粒残留引发剧痛与记忆碎片闪回。 |

  | **当前微粒** | 0 |

  | **预计微粒变化** | 暂无直接获取，但通过短刃吞吐感知到环境中的微粒流动，为后续掠夺铺垫。 |

  | **主要冲突** | 个体存续本能 vs 天堑环境的物理/规则压迫；未知身份的自我认知危机 vs 被植入的微粒契约。 |


  # 第一章 · 灰烬中的胎动


  肺叶像两片干枯的皮革在胸腔内摩擦，每一次吸气都伴随着铁锈味的刺痛。无明睁开眼时，视野并非一片混沌的灰白，而是被一种粘稠的、近乎实质的黑暗所填充。这种黑不是光线的缺席，而是某种活物的呼吸。他躺在天堑的边缘，身下是粗糙如砂纸般的黑色岩层，岩石缝隙间渗出暗红色的粘液，散发着腐烂内脏与陈旧血腥混合的恶臭。寒风如刀割般掠过裸露的皮肤，但他感觉不到冷，只感到一种深入骨髓的空虚——那是记忆被强行剥离后留下的空洞，仿佛灵魂的一部分已被挖去，只剩下这具充满暴力本能的躯壳。他试图坐起，脊椎发出令人牙酸的咔吧声，肌肉纤维因长期僵硬而痉挛。左手本能地摸向腰间，指尖触碰到冰冷金属的瞬间，一股奇异的暖流顺着手臂蔓延至心脏。那是一把短刃，刃身漆黑，没有任何反光，唯有柄部刻着一圈扭曲的古老符文。当他的手指抚过那些凹陷的纹路时，符文竟微微亮起，泛起一层幽蓝的微光，如同沉睡巨兽的眼睑颤动。无明并不记得这把刀的来历，也不记得自己是谁，但身体对武器的熟悉感远超对自我的认知。这是一种刻入骨髓的条件反射：握紧它，就能活下去。他低下头，看着自己的双手，皮肤苍白得近乎透明，皮下隐约可见淡蓝色的血管网络，其中流淌的不是血液，而是一种细微的、闪烁的光点。那是微粒。在这个被四重天堑分割的世界里，微粒是唯一的通货，也是生命的燃料。总量硬上限八亿四千万，每一粒都沾染着前人的血汗与诅咒。无明体内的微粒处于极度匮乏状态，那种饥饿感比胃部的空虚更可怕，它啃噬着他的神经，催促他去掠夺，去吞噬。他深吸一口气，空气中弥漫着硫磺与绝望的味道，远处传来低沉的轰鸣，那是天堑另一侧生态崩塌的声音。


  无明站起身，膝盖因虚弱而打颤，但他强迫自己挺直脊背。周围是一片死寂的荒原，天空呈现出病态的紫红色，云层低垂，仿佛随时会压下来将一切碾碎。这里没有太阳，只有远处天际线上那道巨大的裂缝——第一重天堑，它像一道无法愈合的伤口，横亘在世界的尽头，不断喷吐出黑色的雾气。那些雾气中夹杂着无数细小的颗粒，它们在风中翻滚、碰撞，发出细碎的沙沙声，像是亿万亡魂的低语。无明眯起眼睛，瞳孔收缩成针尖大小，这是“影迹潜行”能力发动的前兆。虽然记忆缺失，但这具身体的战斗本能依然敏锐。他注意到脚下的岩石上有一些奇怪的痕迹，像是某种大型生物爬行留下的爪印，深达寸许，边缘整齐得如同刀切。这些痕迹指向天堑的方向，而在爪印的末端，散落着几颗黯淡的微粒晶体。无明蹲下身，伸出手指轻轻触碰其中一颗。晶体瞬间碎裂，化作一缕青烟消散，同时一股微弱的电流窜入他的指尖，带来一阵短暂的酥麻感。这是低纯度的废弃微粒，连最底层的拾荒者都不屑一顾，但对于此刻的他来说，却是维持意识清醒的唯一慰藉。他环顾四周，发现这片区域并非完全荒芜。在远处的阴影中，矗立着几座残破的建筑废墟，墙壁上爬满了黑色的藤蔓，那些藤蔓似乎在缓慢蠕动，像是在呼吸。废墟之间，隐约可见一些模糊的人影晃动，他们佝偻着背，手中拿着简陋的工具，正在挖掘着什么。那是拾荒者，或者是被遗弃的罪人。在这个末日世界里，生存是一场零和博弈，每个人都是潜在的猎物或猎人。无明握紧短刃，刀刃上的符文光芒愈发炽热，仿佛在回应着他体内那股躁动的渴望。他不知道自己要前往何处，但直觉告诉他，必须离开这里，远离那些正在靠近的危险气息。


  风声骤紧，带着一股浓烈的腥甜味扑面而来。无明的后背肌肉瞬间绷紧，汗毛倒竖。他没有回头，而是借助风势向左侧滑步，动作轻盈得如同鬼魅。就在他移开的刹那，一根粗壮的骨刺擦着他的耳畔飞过，深深插入身后的岩壁，碎石飞溅。骨刺上缠绕着黑色的丝线，丝线另一端连接着一个从阴影中走出的身影。那是一个身材魁梧的男人，脸上戴着由兽骨制成的面具，双眼透过骨孔射出贪婪的光芒。他的身上挂满了各种怪异的饰品，有干枯的手指、风干的心脏，还有闪烁着微弱光芒的微粒容器。男人发出一声低沉的咆哮，声音沙哑如同砂纸打磨骨头：“新鲜的肉……还有未觉醒的微粒。”无明没有说话，只是冷冷地盯着对方。他的脑海中闪过几个破碎的画面：鲜血、尖叫、以及一把染血的短刃刺入胸膛的感觉。这些画面转瞬即逝，却让他心中的杀意沸腾起来。他不信任任何人，尤其是眼前这个散发着恶意与贪婪的家伙。男人见无明沉默，以为他是吓傻了，便迈着沉重的步伐逼近，手中的骨链哗啦作响。“交出你身上的微粒，我可以让你死得痛快些。”男人狞笑着，另一只手从腰间抽出一把弯刀，刀刃上涂抹着绿色的毒液。无明嘴角勾起一抹冰冷的弧度，这不是恐惧，而是兴奋。他的身体开始发热，血液流速加快，眼中的世界变得清晰而缓慢。他能听到男人心跳的节奏，能闻到对方身上散发出的恐惧与欲望交织的气味。这就是他的领域，杀戮的领域。短刃上的符文突然爆发出一阵强烈的蓝光，照亮了周围昏暗的空间。无明身形一晃，消失在原地，只留下一道残影。


  男人的瞳孔猛地收缩，他挥舞弯刀砍向残影，却只斩断了空气。下一秒，冰冷的触感贴上了他的咽喉。无明出现在他的身后，短刃抵住男人的颈动脉，力道控制得恰到好处，既足以切断气管，又不会立刻致死。男人僵住了，手中的弯刀哐当一声掉在地上。他颤抖着举起双手，面具下的声音充满了惊恐：“别……别杀我！我有情报！我知道哪里有高纯度的微粒矿脉！”无明没有松手，反而加重了力道，刀刃切入皮肤，渗出一丝血珠。“说。”他的声音低沉而沙哑，像是从地狱深处传来的回响。男人咽了口唾沫，结结巴巴地说道：“在……在黑石城附近，有一处古老的遗迹，那里封印着大量的微粒。但是……那里有‘守门人’看守，而且……还有‘繁衍契约’的限制。”无明眉头微皱，“繁衍契约”这个词触动了他脑海深处的某根弦。在这个世界，人口即是资源，血脉即是权力。各大势力通过控制生育权来垄断微粒的分配，弱者只能沦为强者的附庸或祭品。男人继续说道：“只有拥有特定血脉的人才能进入遗迹核心，否则会被规则反噬，变成没有意识的傀儡。我看你……你的微粒波动很特殊，也许你就是那个钥匙。”无明心中冷笑，他当然不是什么钥匙，他是一个刺客，一个被遗忘的杀手。但他需要信息，需要资源，更需要弄清楚自己究竟是谁。他松开手，一脚将男人踹翻在地。“带路。”简短的两个字，不容置疑。男人狼狈地爬起来，捡起弯刀，眼神中闪过一丝怨毒，但很快被恐惧掩盖。他知道，如果不听话，下一秒就会变成尸体。


  两人一前一后走在荒原上，脚下的土地松软而潮湿，每一步都会留下深深的脚印。无明始终保持着警惕，目光扫视着周围的每一个角落。他发现，随着距离天堑越来越近，空气中的微粒浓度也在逐渐升高。那些微小的光点在黑暗中飞舞，如同萤火虫一般，美丽而致命。他伸出手，尝试捕捉其中一粒。微粒落在掌心，瞬间融入皮肤，带来一阵清凉的感觉。体内的空虚感稍微缓解了一些，但随之而来的是一种奇怪的悸动，仿佛有什么东西在他的血管里苏醒。他低头看向自己的手臂，发现皮下的蓝色血管变得更加明亮，甚至开始隐隐作痛。这是一种警告，也是一种诱惑。微粒不仅能提供能量，还能强化身体，提升能力，但过度吸收会导致基因崩溃，最终变成怪物。无明深吸一口气，强行压下体内的躁动。他不能贪心，至少现在不能。前方的男人似乎察觉到了他的异样，回头看了一眼，眼中闪过一丝狡黠。“大人，您没事吧？微粒吸收过多可是会爆体的。”语气中带着几分试探与嘲讽。无明没有理会他，只是加快了脚步。他感觉到，前方有一股强大的气息正在逼近，那股气息中蕴含着纯粹的恶意与毁灭欲。那是“守门人”，还是其他的掠夺者？无论是什么，他都做好了战斗的准备。短刃上的符文再次亮起，这一次，光芒不再是幽蓝，而是变成了深邃的黑色，仿佛能吞噬一切光线。无明握紧刀柄，指节泛白。他不知道等待他的是什么，但他知道，只有活下去，才能找回失去的记忆，才能揭开这个世界的真相。


  黑石城的轮廓在紫红色的天幕下逐渐显现，那是一座由黑色巨石堆砌而成的堡垒，城墙高耸入云，表面布满了岁月侵蚀的痕迹。城门紧闭，门前站着两排身穿黑甲的守卫，他们的脸上没有任何表情，如同雕塑一般静止不动。无明停下脚步，观察着城门的结构。他发现，城门上方悬挂着一个巨大的徽章，徽章上刻画着一个复杂的图案：一条蛇缠绕着一颗心脏，心脏中心镶嵌着一颗璀璨的微粒。那是黑石城的标志，也是统治这里的家族——蛇心家族的图腾。男人走到无明身边，低声说道：“大人，我们进不去正门。守卫只认家族信物。我们可以从下水道进去，那里有一条秘密通道，直通遗迹入口。”无明看了他一眼，眼神锐利如刀。“你最好没骗我。”男人打了个寒颤，连忙点头：“不敢，不敢。小的还要靠大人赏饭吃呢。”无明冷哼一声，跟随男人绕到城墙侧面。那里有一个隐蔽的排水口，散发着令人作呕的恶臭。男人率先钻了进去，无明紧随其后。下水道里阴暗潮湿，墙壁上长满了厚厚的苔藓，脚下是粘稠的污水。无明屏住呼吸，尽量不让自己接触到那些污秽之物。他注意到，下水道的墙壁上刻着一些奇怪的符号，与他短刃上的符文有些相似，但更加复杂和混乱。这些符号似乎在讲述着一个古老的故事，关于背叛、屠杀与重生。无明放慢脚步，仔细辨认着那些符号。虽然大部分内容都无法理解，但他隐约感觉到，这些符号与他体内的微粒有着某种联系。当他凝视其中一个符号时，体内的微粒突然剧烈震动起来，短刃上的符文也随之共鸣，发出一阵低沉的嗡鸣声。


  “怎么了？”前面的男人察觉到动静，回头问道。无明摇摇头，示意他继续前进。但他的心中已经掀起了惊涛骇浪。这些符号不仅仅是装饰，它们是某种封印，或者是某种指引。他想起男人提到的“繁衍契约”，难道这座城市的地下，隐藏着关于血脉与微粒起源的秘密？无明握紧短刃，脚步变得更加坚定。他不再只是一个失忆的刺客，他是一个探索者，一个即将揭开真相的掘墓人。下水道越来越深，周围的温度也越来越低。终于，他们来到了一扇巨大的石门前。石门上雕刻着同样的蛇缠心脏图案，但在心脏的位置，有一个凹槽，形状恰好与无明短刃的柄部吻合。男人指着凹槽，兴奋地说道：“就是这里！只要把短刃插进去，门就会打开！”无明看着那个凹槽，心中涌起一股不安。这太巧合了，仿佛这一切都是为他量身定做的陷阱。但他没有选择。后退是死路一条，前进或许还有一线生机。他深吸一口气，将短刃缓缓插入凹槽。咔嚓一声，石门内部传来机关转动的声音。紧接着，石门缓缓打开，露出一条通往黑暗的阶梯。阶梯尽头，是一片广阔的地下空间，中央矗立着一座巨大的祭坛，祭坛上悬浮着一颗巨大的、
  pulsating 的微粒核心。那颗核心散发着耀眼的光芒，照亮了整个地下空间。无明瞪大了眼睛，他从未见过如此纯净、如此庞大的微粒源。然而，就在他的目光触及核心的瞬间，一个冰冷的声音在他脑海中响起：“欢迎回家，无明。”


  无明浑身一震，这个名字如同闪电般击中了他的灵魂。无明？这是我的名字吗？他捂住头部，剧烈的疼痛袭来，无数破碎的记忆片段涌入脑海：鲜血淋漓的战场、哭泣的女人、燃烧的村庄，以及一个承诺——“为了延续血脉，为了拯救世界，你必须成为最强的刺客。”这些画面快速闪回，让他几乎站立不稳。男人见状，露出了狰狞的笑容：“哈哈，看来你想起来了。没错，你是蛇心家族最后的血脉，也是开启遗迹的关键。不过，现在的你，只是一具空壳罢了。”说着，男人撕下了脸上的骨面具，露出了一张扭曲而丑陋的脸。他的皮肤上布满了黑色的鳞片，双眼变成了竖瞳，显然已经发生了变异。“我是蛇心家族的叛徒，也是你的哥哥。我等你很久了，弟弟。”无明抬起头，眼中的迷茫逐渐消散，取而代之的是冰冷的杀意。他拔出短刃，符文光芒大盛，将整个地下空间照得通亮。“不管你是谁，敢挡我者，死。”话音未落，他已化作一道黑影，冲向那个自称是他哥哥的男人。战斗，才刚刚开始。


