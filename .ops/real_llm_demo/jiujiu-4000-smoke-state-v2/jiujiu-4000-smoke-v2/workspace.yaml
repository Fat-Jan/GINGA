  # 第一章 · 锈蚀的呼吸


  黑暗并非虚无，而是某种粘稠的、带有铁锈味的实体。它像陈年的淤血，堵塞在耳道与鼻腔之间，每一次试图吸入空气的动作，都像是在吞咽碎玻璃。


  他睁开眼。


  没有光。或者说，光线在这里是一种被诅咒的奢侈品，早已在第一重天堑的边缘被剥夺殆尽。视野中只有灰败的色块，如同腐烂的皮肤层层剥落，露出底下暗红色的肌理。他躺在一片湿冷的岩石上，身下是积水的坑洼，水面倒映不出他的脸，只有一团模糊的黑影，仿佛连影子都在抗拒承认这具躯壳的存在。


  头痛欲裂。那不是普通的疼痛，而是一种空洞的回响，像是有人用凿子在他的颅骨内部疯狂挖掘，试图挖走某些至关重要的东西。记忆是一片荒芜的冻土，除了寒冷和恐惧，什么都没有留下。他是谁？为何在此？这些问题如同投入深井的石子，连一丝涟漪都未曾激起，便沉入无尽的深渊。


  他抬起手，指尖触碰到腰间冰冷的金属。那是一把短刃。


  刀鞘由某种不知名的黑色皮革包裹，表面布满了细密的裂纹，像是干涸河床上的龟裂大地。当他握住刀柄时，一股奇异的颤栗顺着掌心蔓延至手臂，进而侵入骨髓。那不是温度，也不是震动，而是一种……饥饿感。这把刀在饥饿。


  他缓缓抽出短刃。刀刃并不明亮，反而呈现出一种哑光的灰白色，上面刻满了古老而扭曲的符文。这些符文并非雕刻而成，更像是从金属内部生长出来的血管，蜿蜒曲折，散发着微弱的幽蓝光芒。就在他的目光触及符文的瞬间，那些光芒骤然收缩，随即又猛烈膨胀，仿佛在呼吸。


  “咳……”


  一声压抑的咳嗽打破了死寂。声音来自不远处的一堆乱石之后。


  他本能地压低身形，肌肉紧绷如弓弦。尽管大脑一片空白，但身体的反应却快得惊人。这是一种刻在骨子里的本能，一种属于猎食者的直觉。他无声地滑入阴影之中，动作轻盈得像是一缕烟雾，这就是“影迹潜行”，即便他不知道这个名字，但他知道如何让自己消失在敌人的感知之外。


  乱石堆后，一个身影正艰难地挪动。那是一个穿着破烂皮甲的男人，胸口插着一支断箭，鲜血已经凝固成黑色的痂。男人抬起头，浑浊的眼睛里充满了绝望和惊恐。当他看到从阴影中走出的刺客时，喉咙里发出了一声嘶哑的呜咽。


  “别……别过来……”男人的声音颤抖着，带着浓重的口音，“他们……还在附近……”


  刺客没有说话。他只是静静地站在那里，手中的短刃微微下垂，刀尖指向地面。他的眼神冷漠而空洞，没有任何怜悯，也没有任何杀意，就像是在观察一只受伤的蝼蚁。


  男人似乎意识到了什么，挣扎着想要后退，但伤口撕裂的痛苦让他瘫软在地。“你是……‘清道夫’？”男人喘息着，眼中闪过一丝认命的光芒，“也好……至少……比落在‘掠夺者’手里强……”


  掠夺者？


  这个词像是一道闪电，劈开了他脑海中的迷雾一角。虽然依旧无法回忆起具体的画面，但一种深深的厌恶和警惕油然而生。他低下头，看向自己手中的短刃。刀身上的符文此刻变得更加活跃，幽蓝的光芒如同脉搏般跳动，频率越来越快。


  突然，一阵剧烈的刺痛从手腕传来。他低头看去，只见自己的皮肤下，无数细小的蓝色光点正在游走。它们像是活物一般，沿着血管脉络扩散，所过之处，皮肤泛起诡异的青紫色。这是……微粒残留？


  他记得这个概念。微粒，是这个世界的通货，也是力量的源泉。总量硬上限八亿四千万，每一粒都珍贵。而现在，这些微粒正不受控制地在他体内肆虐，仿佛要冲破皮肤的束缚，回归到某种原始的混沌之中。


  “救……救命……”地上的男人发出了最后的哀求，声音微弱得几乎听不见。


  刺客看着男人逐渐涣散的瞳孔，心中涌起一股莫名的冲动。那不是同情，而是一种更原始、更野蛮的欲望——掠夺。他感觉到体内的微粒在躁动，它们在渴望更多的同类，渴望填补那个巨大的空虚。


  他举起短刃，毫不犹豫地刺入了男人的心脏。


  没有犹豫，没有迟疑。动作干脆利落，仿佛已经重复了千万次。随着刀锋没入血肉，一股温热的液体喷溅而出，染红了他的衣袖。与此同时，短刃上的符文爆发出耀眼的蓝光，一股强大的吸力从刀身传出。


  他清晰地感觉到，有什么东西正从男人的尸体中被抽取出来。那是肉眼可见的蓝色光尘，它们如同萤火虫般飞舞，然后被短刃贪婪地吞噬。随着光尘的涌入，他体内的刺痛感逐渐减轻，取而代之的是一种充盈的力量感。那种感觉令人陶醉，令人上瘾。


  当最后一丝蓝光消失，短刃恢复了平静。符文黯淡下去，重新变得晦涩难懂。他拔出短刃，在男人的衣服上擦拭干净血迹。整个过程行云流水，没有丝毫拖泥带水。


  他站起身，环顾四周。这里是一座废弃的神庙遗址，残破的石柱耸立在黑暗中，宛如巨人的骸骨。空气中弥漫着腐朽和死亡的气息，远处隐约传来风声，像是亡魂的低语。


  他必须离开这里。刚才的战斗虽然短暂，但动静足以引来其他的掠食者。在这个弱肉强食的世界，暴露位置就意味着死亡。


  他收起短刃，再次融入阴影。这一次，他的步伐更加坚定，眼神也更加锐利。虽然记忆依旧缺失，但他知道自己是谁——他是一个杀手，一个为了生存而不择手段的杀手。


  走出神庙遗址，外面的世界是一片荒原。天空呈现出一种病态的紫红色，云层低垂，仿佛随时都会坍塌下来。地面上遍布着黑色的焦痕，那是曾经发生过激烈战斗的痕迹。远处，一座巨大的黑色山峰矗立在天际，山顶笼罩在永恒的雷暴之中。那就是第一重天堑的边界，也是所有流浪者和逃亡者的终点站。


  他朝着天堑的方向走去。每一步落下，脚下的土地都会发出轻微的碎裂声。他能感觉到，体内的微粒正在与周围环境产生共鸣。空气中的微粒浓度极低，稀薄得让人窒息。这意味着，这片区域已经被彻底搜刮过了，没有任何资源可供利用。


  走了大约半个时辰，前方出现了一片枯萎的树林。树干扭曲变形，枝叶干枯发黑，像是被烈火焚烧过一般。在这片死寂的树林中央，站着三个人。


  他们身穿统一的灰色长袍，脸上戴着面具，手中握着长长的法杖。法杖顶端镶嵌着一颗颗暗淡的水晶，散发出微弱的光芒。他们是“微粒掠夺集团”的成员，专门负责清理那些拥有大量微粒的目标，或者捕捉那些体内含有高纯度微粒的变异者。


  刺客停下脚步，隐藏在树干的阴影中。他的心跳平稳而缓慢，呼吸轻不可闻。他在观察，在评估。这三个人呈三角站位，彼此之间保持着完美的距离，形成了一个无懈可击的防御阵型。他们的法杖尖端指向不同的方向，覆盖了所有的死角。


  这是一群训练有素的猎人。


  其中一人突然转过头，面具下的眼睛死死盯着刺客藏身的方向。“出来吧，老鼠。”他的声音冰冷而机械，没有任何情感波动，“我们知道你在那里。”


  刺客没有动。他知道，对方只是在试探。如果他现在现身，立刻就会成为三个法杖同时攻击的目标。他需要等待，等待一个破绽，或者制造一个破绽。


  就在这时，他体内的微粒再次躁动起来。这一次，不仅仅是刺痛，还有一种强烈的指引感。他低下头，看向手中的短刃。刀身上的符文竟然在微微发热，并且指向了左侧的那名掠夺者。


  为什么？


  他没有时间思考。左侧的掠夺者似乎察觉到了什么，法杖顶端的水晶开始闪烁红光。一道炽热的火焰光束瞬间射出，直奔刺客藏身的树干而来。


  轰！


  树干被炸得粉碎，木屑纷飞。刺客在千钧一发之际向右侧翻滚，堪堪避开了致命一击。高温灼烧着他的脸颊，带来一阵剧痛。但他没有停顿，借着翻滚的惯性，整个人如同一头猎豹般扑向了右侧的另一名掠夺者。


  速度太快了。


  那名掠夺者根本来不及反应，只能慌乱地举起法杖格挡。然而，刺客的目标并不是法杖，而是对方的咽喉。短刃在空中划出一道优美的弧线，精准地切断了掠夺者的气管。


  鲜血喷涌而出，染红了灰色的长袍。掠夺者捂着脖子，发出咯咯的声音，最终无力地倒下。


  剩下的两名掠夺者大惊失色。他们没想到这个看似瘦弱的刺客竟然如此凶悍，出手如此狠辣。


  “结阵！”中间的掠夺者大吼一声，法杖重重顿地。一道透明的能量屏障瞬间升起，将他和另一名同伴保护在内。


  刺客停在原地，冷冷地看着那道屏障。他知道，强行突破只会让自己陷入被动。他需要找到屏障的弱点，或者……引诱他们主动出击。


  他深吸一口气，体内的微粒开始加速流动。短刃上的符文再次亮起，这一次，光芒不再是幽蓝，而是变成了深邃的黑色。这是一种他从未见过的颜色，充满了毁灭的气息。


  他举起短刃，对着屏障轻轻一挥。


  没有惊天动地的爆炸，也没有耀眼的光芒。只有一声轻微的脆响，仿佛玻璃破碎的声音。那道坚不可摧的能量屏障，竟然出现了一道细微的裂缝。


  两名掠夺者愣住了。他们不敢相信自己的眼睛。这可是能够抵挡重型火炮轰击的防御结界，怎么可能被一把普通的短刃轻易破坏？


  趁此机会，刺客再次发动了“影迹潜行”。他的身影在空气中扭曲、淡化，最终完全消失。


  “他在哪？！”左边的掠夺者惊慌失措地四处张望，法杖胡乱挥舞，释放出漫无目的的火球。


  “冷静点！”中间的掠夺者厉声喝道，“保持阵型，不要乱动！”


  然而，恐惧已经像瘟疫一样在他们心中蔓延。未知的敌人，未知的能力，这种不确定性比死亡本身更可怕。


  突然，一阵冷风吹过。


  左边的掠夺者感到脖颈处传来一丝凉意。他猛地回头，却什么也没看到。紧接着，他的视线开始旋转，整个世界颠倒过来。他看到了自己的无头尸体，以及站在尸体旁的那个黑影。


  刺客缓缓收回短刃，刀刃上滴落着鲜红的血液。他转过身，看向最后一名掠夺者。


  那名掠夺者已经彻底崩溃了。他扔下法杖，跪在地上，双手抱头，瑟瑟发抖。“别……别杀我……我可以给你微粒……很多微粒……”


  刺客走到他面前，居高临下地看着他。他的眼神依旧冷漠，没有任何波澜。


  “你是谁派来的？”刺客问道，声音沙哑而低沉。


  掠夺者抬起头，满脸泪水和鼻涕。“我……我不知道……我只是个底层成员……我们接到命令，要清除这一带的所有异常微粒波动……”


  “异常微粒波动？”刺客皱起眉头。


  “是的……最近这一带出现了很多奇怪的信号……据说……据说有一个‘容器’觉醒了……”掠夺者语无伦次地说道，“他们说……那个容器身上有古老的符文……”


  古老的符文。


  刺客低头看向手中的短刃。刀身上的符文此刻正散发着微弱的光芒，仿佛在回应着什么。


  “那个容器……在哪里？”刺客追问。


  掠夺者摇了摇头。“我不知道……我真的不知道……求求你，放过我吧……”


  刺客沉默了片刻。他知道，从这个人口中再也问不出更多有用的信息了。而且，留活口只会带来麻烦。


  他举起短刃，结束了掠夺者的生命。


  随着最后一具尸体倒下，周围的空气重新恢复了死寂。刺客站在原地，感受着体内微粒的流动。刚才的战斗消耗了他不少体力，但也让他对这把短刃有了更深的了解。它不仅是一件武器，更像是一个钥匙，一个通往某个未知领域的钥匙。


  他弯下腰，开始搜刮尸体上的物品。除了少量的微粒结晶外，他还找到了一张地图。地图上标注着几个红色的叉号，其中一个叉号的位置，正是他醒来的那座废弃神庙。而在地图的边缘，画着一个奇怪的符号——一个圆圈，中间有一条竖线穿过。


  这个符号，他觉得很熟悉。似乎在记忆的深处，有过类似的印象。


  他将地图收好，转身离开了这片枯萎的树林。天色渐晚，紫红色的天空变得更加深沉，仿佛预示着即将到来的风暴。


  他不知道前方等待着他的是什么，也不知道自己的过去究竟隐藏着怎样的秘密。但他知道，自己已经踏上了一条不归路。在这条路上，只有强者才能生存，只有冷酷才能立足。


  他握紧手中的短刃，感受着刀身传来的微弱颤动。那是一种召唤，也是一种警告。


  第一重天堑就在前方。而他，必须跨越它。


