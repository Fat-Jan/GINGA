  # 第一章 · 灰烬中的呼吸


  痛觉是第一个回归的感官。


  它不像潮水般涌来，而是像生锈的铁钉，一根根楔入骨髓深处。每一寸肌肉都在痉挛，仿佛刚刚经历了一场被强行撕裂又粗暴缝合的手术。空气里弥漫着陈腐的血腥味、硫磺的焦臭，以及一种更难以名状的、类似于金属在真空中摩擦产生的静电味。


  他睁开眼。


  视野中没有光，只有浓稠得化不开的灰暗。这里是“废渊”的边缘，第一重天堑之下，被世界遗弃的角落。头顶上方，那道横亘天际的黑色裂痕——天堑，正无声地流淌着浑浊的紫红色雾气，如同溃烂伤口中渗出的脓液。


  他试图坐起，但身体沉重得像灌满了铅汞。喉咙干涩，吞咽动作带来一阵撕裂般的剧痛。他低头看向自己的双手，指节粗大，布满老茧和细碎的伤痕，指甲缝里嵌着黑褐色的污垢。这是一双属于杀手的手，但他想不起这双手曾扼断过谁的脖颈，也记不起自己是谁。


  脑海中是一片绝对的空白。没有名字，没有过往，没有归属。只有一种深入骨髓的寒意，那是记忆缺失带来的存在性恐惧——如果连过去都不存在，那么此刻的“我”，究竟是何物？


  就在这时，右手传来一阵奇异的温热。


  他低下头，看见一把短刃正静静地躺在他掌心的血泊中。刀身狭长，呈现出一种非金非石的哑光黑色，表面刻满了繁复而扭曲的古老符文。那些符文并非静止不动，而是在微弱地搏动，像是在呼吸。


  随着他的注视，短刃上的符文突然亮起了一瞬幽蓝的光芒。紧接着，一股细微却清晰的吸力从刀柄传导至他的掌心。他感到体内某种沉睡的东西被唤醒了——那是残留在血液深处的“微粒”。


  在这个宇宙中，微粒是唯一的通货，也是力量的源泉。总量恒定，不可再生，上限为八亿四千万。每一粒微粒都承载着能量与权能。而他，这个失忆的刺客，此刻正感觉到体内的微粒正在向那把短刃汇聚。


  这不是掠夺，更像是……归巢。


  短刃微微震颤，发出低沉的嗡鸣。那声音不像是金属碰撞，倒像是无数灵魂在深渊底部的低语。随着嗡鸣声加剧，他看见刀刃边缘的空间开始扭曲，细小的尘埃——不，是肉眼几乎不可见的微粒流——正从空气中被强行抽取，顺着符文的轨迹流入刀身。


  与此同时，他胸口的位置传来一阵剧烈的灼烧感。他撕开早已破烂不堪的衣衫，露出苍白且布满淤青的胸膛。在心口处，一个漆黑的印记正在缓缓浮现。那印记形状诡异，像是一只闭合的眼睛，又像是一个微缩的黑洞。


  “植入体……”一个陌生的词汇突兀地跳入脑海，伴随着一阵剧烈的头痛。


  他不知道这个词意味着什么，但身体的本能告诉他：危险。极度危险。


  周围的环境死寂得可怕。废渊的风总是带着哨音，但此刻，连风声都消失了。这种寂静不是安宁，而是猎食者逼近前的屏息。


  他握紧短刃，指尖因用力而发白。短刃上的符文光芒渐盛，那股吸力变得更加强劲。他感觉到体内的微粒余额正在发生微妙变化——虽然依旧接近于零，但那种空虚感正在被一种冰冷的充实感取代。这把刀在吃微粒，也在喂养他。


  突然，左侧三十米处的碎石堆动了一下。


  没有任何预兆，也没有任何声响。如果不是他对气流变化的敏锐感知，根本不可能察觉。那是“影迹潜行”的高阶运用，对方隐藏得极好，但在这一刻，杀意泄露了。


  他猛地转头，瞳孔收缩成针芒状。


  阴影中，三个身影缓缓浮现。他们穿着统一的灰色斗篷，面部被厚重的面具遮盖，面具上绘着红色的螺旋纹章——那是“微粒掠夺集团”的标志。在这个资源枯竭的世界，他们是清道夫，也是收割者。他们追踪一切带有高浓度微粒反应的个体，将其剥离、提炼，直至死亡。


  为首的一人抬起手，手中握着一根细长的探针，探针尖端闪烁着危险的蓝光。


  “检测到异常波动。”那个人的声音经过面具的处理，显得沉闷而机械，“目标体内有未登记的植入体反应。等级：未知。建议立即捕获。”


  另外两人迅速散开，呈三角包围之势。他们的动作流畅而致命，每一步都踩在最佳的进攻位置上。这是训练有素的杀戮机器，没有任何多余的情感，只有对任务的绝对执行。


  他站起身，双腿还有些颤抖，但手中的短刃却稳如磐石。短刃上的符文此刻已经完全点亮，幽蓝的光芒照亮了他苍白的脸。他看不清自己的表情，但他能感觉到嘴角勾起了一抹冰冷的弧度。


  那是凶性的显化。


  即使失去了记忆，即使身处绝境，他的身体依然记得如何杀人。


  “交出植入体，或者成为微粒的一部分。”首领冷冷地说道，探针向前探出，一道无形的压力场瞬间笼罩了整个区域。空气中的微粒变得躁动不安，仿佛在欢呼即将到来的盛宴。


  他没有回答。语言在这种时候是多余的累赘。


  他深吸一口气，肺部吸入充满铁锈味的空气。体内的微粒在短刃的引导下疯狂运转，沿着经脉奔涌。这是一种从未体验过的感觉——痛苦，却又令人战栗的兴奋。他感觉到自己的力量在膨胀，虽然微不足道，但却足够锋利。


  下一秒，他动了。


  没有花哨的动作，没有华丽的招式。他只是简单地向前踏出一步，身形便消失在原地。


  “影迹潜行”发动。


  这不是魔法，也不是超能力，而是对身体极限的掌控，是对光线、声音和气流的极致利用。在这一瞬间，他与黑暗融为一体。


  首领的反应极快，探针立刻转向左侧，一道蓝色的光束射出，击碎了地面的岩石。然而，那里空无一人。


  “在上面！”另一名掠夺者惊呼。


  他确实不在上面。他在下面。


  当光束射出的瞬间，他已经滑步到了首领的脚下。短刃无声地挥出，划出一道完美的弧线。


  噗嗤。


  利刃切入肉体的声音沉闷而湿润。首领的小腿肌腱被精准切断，整个人失去平衡，重重地摔在地上。鲜血喷涌而出，溅在他的脸上，温热而粘稠。


  他没有停顿，借着反冲力转身，短刃再次挥出。这一次，目标是第二名掠夺者的咽喉。


  那人举起手臂格挡，短刃切开了他的护臂，深深嵌入小臂骨骼。惨叫声还未出口，就被他一脚踹在膝盖上，强行打断。骨裂声清脆悦耳，如同乐章中的高音。


  第三名掠夺者惊恐地后退，手中的武器胡乱挥舞。“怪物！你是怪物！”


  他站在原地，喘息着。胸口的黑色印记滚烫如火，短刃上的符文光芒达到了顶峰。他感觉到体内的微粒正在剧烈震荡，仿佛有什么东西要破壳而出。


  他看向倒在地上的三人。他们没有死，但已经失去了战斗力。对于掠夺集团来说，失败意味着被抛弃，甚至被回收。


  他走到首领面前，蹲下身。首领的面具已经碎裂，露出一张年轻却充满恐惧的脸。那双眼睛里写满了不解和绝望。


  “谁派你们来的？”他问，声音沙哑，像是砂纸摩擦过粗糙的石面。


  首领颤抖着嘴唇，想要说什么，但最终只是吐出一口血沫。“你……你不该醒来……内宇宙的……禁忌……”


  话未说完，首领的身体突然抽搐起来。他胸口的衣服爆裂开来，露出一个和他一模一样的黑色印记。只不过，那个印记正在迅速扩散，黑色的纹路像蜘蛛网一样爬满全身。


  “不……不要……”首领发出最后的哀嚎，随后身体崩解，化作无数细小的黑色颗粒，消散在空气中。


  剩下的两名掠夺者见状，吓得魂飞魄散，连滚带爬地向远处逃去。


  他没有追。因为他知道，真正的威胁才刚刚开始。


  他看着手中沾血的短刃，符文的光芒逐渐黯淡，恢复成原本的哑光黑色。但他能感觉到，短刃内部似乎多了一丝温暖的气息——那是从首领身上吸收来的微粒，虽然微薄，却是真实的收获。


  他站起身，望向头顶那道巨大的天堑。紫红色的雾气翻滚着，仿佛在嘲笑他的渺小。


  内宇宙。禁忌。


  这两个词在他脑海中回荡。他不知道这意味着什么，但他知道，自己已经被卷入了一个巨大的漩涡。失忆不是偶然，植入体不是意外，而这把短刃，是他唯一的线索，也是他唯一的武器。


  他擦去脸上的血迹，将短刃收入鞘中。那一刻，他感到一种前所未有的孤独。但这孤独并不冰冷，反而让他清醒。


  在这个微粒总量恒定的世界里，每一个幸存者都是窃贼，每一个死者都是祭品。而他，这个没有过去的刺客，必须在这残酷的规则中找到自己的位置。


  要么吞噬他人，要么被他人吞噬。


  他迈开脚步，向着废渊的深处走去。身后的脚印很快被风沙掩埋，仿佛他从未存在过。但在那把短刃的深处，古老的符文微微闪烁，记录下了这一章的开始。


